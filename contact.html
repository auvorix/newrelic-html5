<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NR Test HTML5 — Contact</title>

  <script type="module" src="/src/index.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; color: #222; }
    header { background: #0d1b2a; color: #fff; padding: 20px 40px; display: flex; align-items: center; justify-content: space-between; }
    header h1 { font-size: 22px; letter-spacing: 1px; }
    header span { font-size: 12px; background: #1b4332; color: #52b788; padding: 4px 10px; border-radius: 20px; }
    nav { background: #1b263b; padding: 0 40px; display: flex; gap: 4px; }
    nav a { color: #adb5bd; text-decoration: none; padding: 14px 18px; font-size: 14px; display: block; }
    nav a:hover, nav a[aria-current="page"] { color: #52b788; border-bottom: 2px solid #52b788; }
    main { max-width: 860px; margin: 40px auto; padding: 0 20px; }
    section h2 { font-size: 26px; margin-bottom: 12px; color: #0d1b2a; }
    section p { line-height: 1.8; color: #555; margin-bottom: 20px; }
    article { background: #fff; border-radius: 8px; padding: 28px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #1b263b; }
    input, textarea { width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px; font-size: 14px; margin-bottom: 18px; font-family: inherit; }
    input:focus, textarea:focus { outline: none; border-color: #52b788; }
    button { background: #52b788; color: #fff; border: none; padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 15px; font-weight: 600; }
    button:hover { background: #40916c; }
    footer { background: #0d1b2a; color: #6c757d; text-align: center; padding: 24px; margin-top: 60px; font-size: 13px; }
  </style>
</head>
<body>

  <header>
    <h1>NR Test — HTML5</h1>
    <span>New Relic Test</span>
  </header>

  <nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="contact.html" aria-current="page">Contact</a>
  </nav>

  <main>
    <section>
      <h2>Contact</h2>
      <p>This form is static — it does not submit anywhere. It exists to generate user interaction events for New Relic to capture.</p>

      <article>
        <form>
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" autocomplete="name">

          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="your@email.com" autocomplete="email">

          <label for="message">Message</label>
          <textarea id="message" name="message" rows="5" placeholder="Your message..."></textarea>

          <button type="button" onclick="alert('Form is static — for testing only')">Send Message</button>
        </form>
      </article>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 NR Test HTML5 — New Relic monitoring test site</p>
  </footer>

</body>
</html>
